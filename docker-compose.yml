services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: spenduser
      POSTGRES_PASSWORD: spendpass
      POSTGRES_DB: spenddb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spenduser -d spenddb"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env.secret
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: ./bot
    env_file: .env.secret
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  ollama_data:
